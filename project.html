<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>世界の天気予報</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>世界の天気予報</h1>

    <table border="1">
      <tr>
        <th>都市名</th>
        <td id="city">-</td>
      </tr>
      <tr>
        <th>天気</th>
        <td id="weather">-</td>
      </tr>
      <tr>
        <th>最低気温</th>
        <td id="temp_min">-</td>
      </tr>
      <tr>
        <th>最高気温</th>
        <td id="temp_max">-</td>
      </tr>
      <tr>
        <th>湿度</th>
        <td id="humidity">-</td>
      </tr>
      <tr>
        <th>風速</th>
        <td id="wind_speed">-</td>
      </tr>
      <tr>
        <th>風向</th>
        <td id="wind_deg">-</td>
      </tr>
    </table>

    <br>
    <!-- 課題6-1: ボタンを押すと天気情報が表示される -->
    <button id="btn">天気を表示する</button>

    <!-- weather.js の読み込み -->
    <script src="weather.js"></script>
  </body>
</html>
